name: Android CI

on:
  push:
    branches: [ "main", "master", "copilot/*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Job 1: Build Native Libraries in Parallel
  build-native:
    name: Build Native (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, x86_64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache llama.cpp
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: app/src/main/cpp/llama.cpp
          key: llama-cpp-v1-${{ hashFiles('.github/workflows/android-ci.yml') }}

      - name: Prepare native dependencies
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/src/main/cpp
          git clone --depth 1 --recursive https://github.com/ggerganov/llama.cpp.git app/src/main/cpp/llama.cpp

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Native Library
        run: |
          # Use Gradle to build only the native part for this specific ABI
          chmod +x gradlew
          ./gradlew :app:externalNativeBuildDebug \
            -Pandroid.startParameter.projectProperties="android.injected.build.abi=${{ matrix.abi }}" \
            -Pandroid.injected.build.abi=${{ matrix.abi }}

      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-${{ matrix.abi }}
          path: app/build/intermediates/cmake/debug/obj/${{ matrix.abi }}/*.so

  # Job 2: Build APK and Run Tests
  build-apk:
    name: Build APK
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download All Native Artifacts
        uses: actions/download-artifact@v4
        with:
          path: app/src/main/jniLibs
          pattern: native-libs-*
          merge-multiple: false

      - name: Organize Native Libs
        run: |
          # Move from native-libs-abi/*.so to abi/*.so
          cd app/src/main/jniLibs
          for dir in native-libs-*; do
            abi=${dir#native-libs-}
            mkdir -p $abi
            mv $dir/*.so $abi/
            rm -rf $dir
          done
          ls -R

      - name: Bundle Vosk Model into Assets
        run: |
          mkdir -p app/src/main/assets
          curl -L "https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip" -o vosk-model.zip
          unzip vosk-model.zip
          # The zip extracts to a folder like vosk-model-small-en-us-0.15
          # We want it as assets/model-small-en-us
          mv vosk-model-small-en-us-0.15 app/src/main/assets/model-small-en-us
          rm vosk-model.zip

      - name: Grant execute permission for gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk